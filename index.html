<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sumanth · 斬鉄剣</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;cursor:none;background:#000;}
canvas{position:fixed;top:0;left:0;display:block;}
#sky{z-index:1;}
#gl{z-index:2;}
#fx{z-index:3;pointer-events:none;}
#glass{z-index:4;pointer-events:none;backdrop-filter:blur(0px);}
#hk{z-index:5;pointer-events:none;mix-blend-mode:screen;}
#lg{z-index:6;pointer-events:none;mix-blend-mode:screen;}
#fr{z-index:7;pointer-events:none;mix-blend-mode:screen;}
#ref{z-index:8;pointer-events:none;mix-blend-mode:screen;}
#dr{z-index:9;}
#off,#bm,#pm{display:none;}

#cur{position:fixed;z-index:500;pointer-events:none;width:22px;height:22px;
  border-radius:50%;border:1px solid rgba(180,80,255,.85);
  transform:translate(-50%,-50%);
  transition:width .12s,height .12s,background .12s,border-color .12s;
  box-shadow:0 0 18px rgba(140,40,230,.55), inset 0 0 8px rgba(180,80,255,.3);}
#cur.s{width:6px;height:6px;background:rgba(220,140,255,1);border-color:transparent;
  box-shadow:0 0 30px rgba(200,100,255,.95);}
#fl{position:fixed;inset:0;z-index:400;opacity:0;pointer-events:none;}

/* LOADER */
#ld{position:fixed;inset:0;z-index:600;
background:radial-gradient(ellipse 100% 100% at 50% 38%,#0c0220 0%,#03000e 55%,#000104 100%);
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
transition:opacity 1.2s;}
#ld.out{opacity:0;pointer-events:none;}
.lk{font-family:'Cinzel Decorative',serif;font-size:clamp(44px,9vw,98px);
color:rgba(150,60,255,.7);letter-spacing:10px;animation:kpulse 1.9s ease-in-out infinite;
text-shadow:0 0 60px rgba(150,50,255,.5);}
@keyframes kpulse{0%,100%{opacity:.3;transform:scale(1);}50%{opacity:1;transform:scale(1.02);text-shadow:0 0 80px rgba(160,60,255,.85);}}
.lb{width:240px;height:1px;background:rgba(130,40,220,.14);overflow:hidden;}
.lf{height:100%;background:linear-gradient(90deg,#3800a0,#b050ff);width:0;transition:width .25s;
  box-shadow:0 0 12px rgba(180,80,255,.7);}
.lt{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:5px;
color:rgba(150,60,255,.42);text-transform:uppercase;}
#lerr{display:none;font-family:'JetBrains Mono',monospace;font-size:8px;
color:rgba(255,80,80,.5);letter-spacing:3px;text-align:center;margin-top:4px;}

/* UI */
.ul{position:fixed;inset:0;z-index:30;pointer-events:none;
display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:9vh;}
#u1{transition:opacity .7s;}
#u2{position:fixed;bottom:6vh;width:100%;display:flex;justify-content:center;z-index:35;pointer-events:none;opacity:0;transition:opacity 1s;}
#u2.on{opacity:1;}
.jt{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:6px;
color:rgba(150,70,255,.5);text-transform:uppercase;margin-bottom:9px;}
.gt{font-family:'Cinzel',serif;font-size:clamp(11px,1.6vw,15px);letter-spacing:10px;
text-transform:uppercase;color:rgba(185,120,255,.7);
position:relative;display:inline-block;animation:gb 3s ease-in-out infinite;
text-shadow:0 0 24px rgba(150,50,255,.4);}
.gt::before,.gt::after{content:attr(data-t);position:absolute;left:0;top:0;font:inherit;letter-spacing:inherit;}
.gt::before{color:rgba(220,30,80,.42);animation:ga 3s infinite;clip-path:polygon(0 0,100% 0,100% 40%,0 40%);}
.gt::after{color:rgba(40,120,230,.28);animation:gc 3s infinite;clip-path:polygon(0 62%,100% 62%,100% 100%,0 100%);}
@keyframes gb{0%,100%{opacity:.6;}50%{opacity:1;}}
@keyframes ga{0%,82%,100%{transform:none;}84%{transform:translateX(-5px) skewX(-6deg);}88%{transform:translateX(4px);}92%{transform:none;}96%{transform:translateX(4px) skewX(-2deg);}98%{transform:none;}}
@keyframes gc{0%,82%,100%{transform:none;}85%{transform:translateX(5px) skewX(4deg);}89%{transform:translateX(-4px);}93%{transform:none;}97%{transform:translateX(-3px);}99%{transform:none;}}
.sc{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:5px;
color:rgba(170,90,255,.55);text-transform:uppercase;
display:flex;flex-direction:column;align-items:center;gap:9px;}
.sc::after{content:'';width:1px;height:42px;
background:linear-gradient(to bottom,rgba(170,90,255,.6),transparent);
animation:scp 1.6s ease-in-out infinite;}
@keyframes scp{0%,100%{transform:scaleY(.4);opacity:.4;transform-origin:top;}50%{transform:scaleY(1);opacity:1;transform-origin:top;}}

/* BLADE STATS - glassmorphism */
#bs{position:fixed;right:4vw;top:50%;transform:translateY(-50%);z-index:35;
pointer-events:none;opacity:0;transition:opacity 1s;
padding:22px 24px;border-radius:14px;
background:rgba(20,5,45,.18);
backdrop-filter:blur(18px) saturate(140%);
-webkit-backdrop-filter:blur(18px) saturate(140%);
border:1px solid rgba(180,100,255,.18);
box-shadow:0 8px 40px rgba(80,0,180,.25), inset 0 1px 0 rgba(200,140,255,.12);}
#bs.on{opacity:1;}
.sb{display:flex;flex-direction:column;gap:14px;}
.sl{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:4px;
text-transform:uppercase;color:rgba(180,110,255,.55);margin-bottom:3px;display:block;}
.sv{font-family:'Cinzel',serif;font-size:12px;color:rgba(225,180,255,.92);
text-shadow:0 0 12px rgba(150,60,230,.4);}
.sd{width:1px;height:22px;background:linear-gradient(to bottom,rgba(170,90,255,.32),transparent);margin-left:4px;}

/* SCROLL PROGRESS */
#sp{position:fixed;left:4vw;top:50%;transform:translateY(-50%);z-index:35;
pointer-events:none;opacity:0;transition:opacity 1s;
display:flex;flex-direction:column;align-items:center;gap:8px;
padding:18px 14px;border-radius:14px;
background:rgba(20,5,45,.16);
backdrop-filter:blur(14px) saturate(130%);
-webkit-backdrop-filter:blur(14px) saturate(130%);
border:1px solid rgba(180,100,255,.15);}
#sp.on{opacity:1;}
.spt{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:3px;
color:rgba(170,90,255,.45);text-transform:uppercase;}
#spb{width:1px;height:130px;background:rgba(150,70,255,.18);position:relative;}
#spf{position:absolute;top:0;left:0;width:1px;background:linear-gradient(to bottom,rgba(220,140,255,.95),rgba(120,20,220,.4));
height:0%;transition:height .25s;box-shadow:0 0 14px rgba(180,80,255,.7);}

/* ACT 3 */
#a3{position:fixed;inset:0;z-index:100;
background:radial-gradient(ellipse 100% 100% at 50% 35%,#110228 0%,#060118 50%,#010006 100%);
opacity:0;pointer-events:none;transition:opacity 1.6s;
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;}
#a3.on{opacity:1;pointer-events:all;}
.a3t{font-family:'Cinzel Decorative',serif;font-size:clamp(22px,5.5vw,78px);
color:rgba(205,150,255,1);text-align:center;
text-shadow:0 0 60px rgba(150,50,255,.65),0 0 120px rgba(110,0,200,.35);}
.a3s{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:5px;
color:rgba(170,90,255,.5);text-transform:uppercase;}
</style>
</head>
<body>
<canvas id="sky"></canvas>
<canvas id="gl"></canvas>
<canvas id="fx"></canvas>
<canvas id="glass"></canvas>
<canvas id="hk"></canvas>
<canvas id="lg"></canvas>
<canvas id="fr"></canvas>
<canvas id="ref"></canvas>
<canvas id="dr"></canvas>
<canvas id="off" width="1024" height="1024"></canvas>
<canvas id="bm" width="512" height="512"></canvas>
<canvas id="pm" width="128" height="128"></canvas>

<div id="cur"></div>
<div id="fl"></div>

<div id="ld">
  <div class="lk">刀</div>
  <div class="lb"><div class="lf" id="lf"></div></div>
  <div class="lt" id="lt">Forging · 鍛造</div>
  <div id="lerr"></div>
</div>

<div class="ul" id="u1">
  <span class="jt">斬れ · 鬼殺し</span>
  <span class="gt" data-t="DRAW · AND · SLASH">DRAW &nbsp;·&nbsp; AND &nbsp;·&nbsp; SLASH</span>
</div>

<div id="u2"><div class="sc"><span>続く · Scroll to reveal</span></div></div>

<div id="bs">
  <div class="sb">
    <div><span class="sl">Blade · 刀身</span><span class="sv">Black Obsidian</span></div>
    <div class="sd"></div>
    <div><span class="sl">Edge · 刃</span><span class="sv">Cursed Purple</span></div>
    <div class="sd"></div>
    <div><span class="sl">Haki · 覇気</span><span class="sv">Conqueror's</span></div>
    <div class="sd"></div>
    <div><span class="sl">Rank · 位</span><span class="sv">Demon Slayer</span></div>
  </div>
</div>

<div id="sp">
  <div class="spt">Reveal</div>
  <div id="spb"><div id="spf"></div></div>
  <div class="spt">破壊</div>
</div>

<div id="a3">
  <div class="a3t">世界を創る者</div>
  <div class="a3s">— The One Who Creates Worlds —</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/AfterimagePass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/AfterimageShader.js"></script>

<script>
/* ═══════════════════════════════════════
   CANVAS SETUP
═══════════════════════════════════════ */
const W=()=>innerWidth, H=()=>innerHeight;
const skyC=document.getElementById('sky'),
      fxC=document.getElementById('fx'),
      glC2=document.getElementById('glass'),
      hkC=document.getElementById('hk'),
      lgC=document.getElementById('lg'),
      frC=document.getElementById('fr'),
      refC=document.getElementById('ref'),
      drC=document.getElementById('dr');

[skyC,fxC,glC2,hkC,lgC,frC,refC,drC].forEach(c=>{c.width=W();c.height=H();});

const skx=skyC.getContext('2d'),
      fxx=fxC.getContext('2d'),
      glx=glC2.getContext('2d'),
      hkx=hkC.getContext('2d'),
      lgx=lgC.getContext('2d'),
      frx=frC.getContext('2d'),
      rfx=refC.getContext('2d'),
      drx=drC.getContext('2d');

window.addEventListener('resize',()=>{
  [skyC,fxC,glC2,hkC,lgC,frC,refC,drC].forEach(c=>{c.width=W();c.height=H();});
  R.setSize(W(),H()); CAM.aspect=W()/H(); CAM.updateProjectionMatrix();
  if(composer) composer.setSize(W(),H());
});

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
const S={
  phase:'LOAD', t:0, dt:0, lt:0,
  nx:0, ny:0, mx:W()/2, my:H()/2,
  drag:{on:false,sx:0,sy:0,cx:0,cy:0},
  scrollY:0, scrollTarget:0, sp:0,
  kx:0, ky:0, kz:.65,
  krx:0, kry:0, krz:Math.PI/2,
  camX:0, camY:0, camZ:7,
  ptRX:0, ptPY:0, pbRX:0, pbPY:0,
  gI:0, aI:0, hI:0, edgeGlow:0, bloomI:.55,
  tw:[], fp:[], lightning:[],
  sliced:false, modelReady:false,
  refOpacity:0,
  bladeMask:null,
};

/* ═══════════════════════════════════════
   TWEENS
═══════════════════════════════════════ */
function ease(t,m='io'){
  return m==='o'?1-Math.pow(1-t,3):m==='i'?t*t*t:t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
}
function tw(o,to,d,m='io',cb){
  const fr={};for(const k in to)fr[k]=o[k];
  S.tw.push({o,fr,to,d,m,el:0,cb});
}
function stepTw(dt){
  for(let i=S.tw.length-1;i>=0;i--){
    const t=S.tw[i]; t.el=Math.min(t.el+dt,t.d);
    const p=ease(t.el/t.d,t.m);
    for(const k in t.to)t.o[k]=t.fr[k]+(t.to[k]-t.fr[k])*p;
    if(t.el>=t.d){if(t.cb)t.cb();S.tw.splice(i,1);}
  }
}

/* ═══════════════════════════════════════
   PARTICLE SPRITE — kills boxy pixelation
═══════════════════════════════════════ */
function buildSpriteTex(){
  const c=document.getElementById('pm'), x=c.getContext('2d');
  const g=x.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(.25,'rgba(220,160,255,.85)');
  g.addColorStop(.55,'rgba(140,50,220,.4)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=g; x.fillRect(0,0,128,128);
  const t=new THREE.CanvasTexture(c);
  t.minFilter=THREE.LinearFilter;
  return t;
}
const SPRITE_TEX=buildSpriteTex();

/* ═══════════════════════════════════════
   THREE.JS RENDERER + POSTPROCESSING
═══════════════════════════════════════ */
const R=new THREE.WebGLRenderer({
  canvas:document.getElementById('gl'),
  antialias:true, alpha:true,
  powerPreference:'high-performance',
  preserveDrawingBuffer:true
});
R.setPixelRatio(Math.min(devicePixelRatio,2));
R.setSize(W(),H());
R.toneMapping=THREE.ACESFilmicToneMapping;
R.toneMappingExposure=1.0;
R.shadowMap.enabled=true;
R.shadowMap.type=THREE.PCFSoftShadowMap;
R.setClearColor(0x000000,0);
R.autoClear=false;

const SC=new THREE.Scene();
SC.fog=new THREE.FogExp2(0x04000f,.018);

const CAM=new THREE.PerspectiveCamera(50,W()/H(),.001,500);
CAM.position.set(0,0,7);

// POST-PROCESSING
let composer=null, bloomPass=null, afterPass=null;
try{
  composer=new THREE.EffectComposer(R);
  composer.setSize(W(),H());
  composer.addPass(new THREE.RenderPass(SC,CAM));

  bloomPass=new THREE.UnrealBloomPass(
    new THREE.Vector2(W(),H()),
    0.85,   // strength
    0.6,    // radius
    0.18    // threshold
  );
  composer.addPass(bloomPass);

  afterPass=new THREE.AfterimagePass(0.82); // motion blur trail
  composer.addPass(afterPass);
} catch(e){console.warn('Post-processing unavailable',e);}

/* ── LIGHTING ── */
SC.add(new THREE.AmbientLight(0x03010a,0.85));

const keyL=new THREE.DirectionalLight(0x8870b8,3.2);
keyL.position.set(-3,6,5); keyL.castShadow=true;
keyL.shadow.mapSize.set(2048,2048); SC.add(keyL);

const fillL=new THREE.DirectionalLight(0x200840,1.3);
fillL.position.set(5,1,-2); SC.add(fillL);

const rimL=new THREE.DirectionalLight(0x200a40,1.0);
rimL.position.set(0,-4,-5); SC.add(rimL);

const edgeL=new THREE.PointLight(0x9900ff,0,8);
edgeL.position.set(0,0,.5); SC.add(edgeL);

const envL=new THREE.PointLight(0x4400cc,0,12);
SC.add(envL);

const bladeSpot=new THREE.SpotLight(0xb070ff,0,7,0.7,0.4,1.5);
bladeSpot.position.set(0,.8,1.2); SC.add(bladeSpot);

const bladeSpot2=new THREE.SpotLight(0x3300bb,0,7,0.7,0.4,1.5);
bladeSpot2.position.set(0,-.8,.8); SC.add(bladeSpot2);

/* ── STARS ── using sprite texture, no pixelation */
{
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(1500*3);
  for(let i=0;i<1500;i++){
    pos[i*3]=(Math.random()-.5)*90;
    pos[i*3+1]=Math.random()*25-5;
    pos[i*3+2]=(Math.random()-.5)*35-8;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const mat=new THREE.PointsMaterial({
    color:0xddbbff, size:.08, transparent:true, opacity:.6,
    blending:THREE.AdditiveBlending, depthWrite:false,
    map:SPRITE_TEX, alphaTest:.01
  });
  SC.add(new THREE.Points(geo,mat));
}

/* ── MOUNTAINS ── */
const mtnGrp=new THREE.Group(); SC.add(mtnGrp);
function addMtn(h,w,sg,col,z,xo,op){
  const g=new THREE.PlaneGeometry(w,h,sg,1);
  const p=g.attributes.position;
  for(let i=0;i<p.count;i++){
    const vx=p.getX(i),vy=p.getY(i);
    if(vy>-h*.3){
      const n=(vx/w+.5);
      const pk=Math.sin(n*Math.PI)*h*.5
              +Math.sin(n*Math.PI*3.1)*.15*h
              +Math.sin(n*Math.PI*8)*.03*h
              +Math.sin(n*Math.PI*16)*.012*h;
      p.setY(i,Math.max(-h*.5,vy+pk));
    }
  }
  g.computeVertexNormals();
  const m=new THREE.Mesh(g,new THREE.MeshBasicMaterial({
    color:col, transparent:true, opacity:op, depthWrite:false
  }));
  m.position.set(xo,-2.8,z);
  m.userData.pf=.5+z*.04;
  mtnGrp.add(m);
}
addMtn(14,70,140,0x010006,-18,0,.99);
addMtn(10,48,105,0x03000d,-13,-1,.93);
addMtn(7,36,78,0x06011e,-8,1.5,.82);
addMtn(5,28,60,0x09032a,-4.5,-1.5,.68);
addMtn(4,20,44,0x0c0440,-2,.5,.52);

/* ── VOLUMETRIC MIST ── */
const mistGrp=new THREE.Group(); SC.add(mistGrp);
for(let i=0;i<10;i++){
  const m=new THREE.Mesh(
    new THREE.PlaneGeometry(60,4+i*.5),
    new THREE.MeshBasicMaterial({color:0x150538,transparent:true,opacity:.025+i*.012,depthWrite:false,blending:THREE.AdditiveBlending})
  );
  m.position.set(0,-1+i*.4,-10+i*1.0);
  m.userData={sp:.0003+i*.0001,amp:.5+i*.07,ph:Math.random()*Math.PI*2};
  mistGrp.add(m);
}

/* ── VOLUMETRIC GOD RAYS ── */
const rayGrp=new THREE.Group(); SC.add(rayGrp);
for(let i=0;i<14;i++){
  const a=-Math.PI*.22+i*(Math.PI*.034);
  const m=new THREE.Mesh(
    new THREE.ConeGeometry(.06+Math.random()*.06,34,4,1,true),
    new THREE.MeshBasicMaterial({
      color:0x4d0090, transparent:true,
      opacity:.012+Math.random()*.022,
      depthWrite:false, blending:THREE.AdditiveBlending, side:THREE.DoubleSide
    })
  );
  m.position.set(Math.sin(a)*3.5,10,-7); m.rotation.z=a;
  m.userData={ph:Math.random()*Math.PI*2,bo:m.material.opacity};
  rayGrp.add(m);
}

/* ── PAPER SCROLL ── */
function mkPaperTex(){
  const cv=document.createElement('canvas'); cv.width=900; cv.height=1500;
  const c=cv.getContext('2d');
  const g=c.createLinearGradient(0,0,900,1500);
  g.addColorStop(0,'#ede2c8'); g.addColorStop(.5,'#e2cfa4'); g.addColorStop(1,'#d6bb8a');
  c.fillStyle=g; c.fillRect(0,0,900,1500);
  for(let i=0;i<18000;i++){
    c.fillStyle=`rgba(55,28,4,${Math.random()*.04})`;
    c.fillRect(Math.random()*900,Math.random()*1500,1,1);
  }
  c.strokeStyle='rgba(72,38,6,.45)'; c.lineWidth=3.5; c.strokeRect(20,20,860,1460);
  c.strokeStyle='rgba(72,38,6,.18)'; c.lineWidth=1.5; c.strokeRect(30,30,840,1440);
  c.textAlign='center';
  c.font='bold 85px serif'; c.fillStyle='rgba(11,3,1,.72)';
  ['世','界','を','創','る','者'].forEach((k,i)=>c.fillText(k,660,88+i*95));
  c.font='72px serif'; c.fillStyle='rgba(11,3,1,.5)';
  ['三','次','元','の','建','築','家'].forEach((k,i)=>c.fillText(k,470,90+i*82));
  c.font='58px serif'; c.fillStyle='rgba(11,3,1,.28)';
  ['ス','マ','ン','ス'].forEach((k,i)=>c.fillText(k,270,112+i*66));
  c.save(); c.translate(195,1390); c.rotate(-.055);
  c.strokeStyle='rgba(125,12,12,.78)'; c.lineWidth=3.5; c.strokeRect(-38,-30,76,60);
  c.font='bold 40px serif'; c.fillStyle='rgba(125,12,12,.75)'; c.fillText('印',0,14); c.restore();
  return new THREE.CanvasTexture(cv);
}
const ptx=mkPaperTex();
const PW=2.1, PH=3.5;
function mkHalf(top){
  const g=new THREE.PlaneGeometry(PW,PH/2,4,4);

/* ── LOAD GLB ── */
const loader=new THREE.GLTFLoader();
const ltEl=document.getElementById('lt'), leEl=document.getElementById('lerr');

loader.load('models/katana.glb',
  gltf=>{
    const mdl=gltf.scene;
    const box=new THREE.Box3().setFromObject(mdl);
    const sz=box.getSize(new THREE.Vector3());
    const sc=5.0/Math.max(sz.x,sz.y,sz.z,.001);
    mdl.scale.setScalar(sc);
    const ctr=box.getCenter(new THREE.Vector3());
    mdl.position.set(-ctr.x*sc,-ctr.y*sc,-ctr.z*sc);

    const meshes=[];
    mdl.traverse(c=>{
      if(!c.isMesh)return;
      c.castShadow=c.receiveShadow=true;
      const ms=Array.isArray(c.material)?c.material:[c.material];
      if(Array.isArray(c.material)){
        c.material=ms.map(m=>enhanceMat(m));
      } else {
        c.material=enhanceMat(ms[0]);
      }
      meshes.push(c);
    });

    KAT.add(mdl);
    KAT.userData.meshes=meshes;
    KAT.userData.model=mdl;
    S.modelReady=true;
  },
  xhr=>{
    if(xhr.total>0)ltEl.textContent=`Tempering · ${Math.round(xhr.loaded/xhr.total*100)}%`;
  },
  err=>{
    console.warn(err);
    leEl.style.display='block';
    leEl.textContent='⚠ models/katana.glb not found — using stand-in';
    // Build a stand-in katana so the rest still works
    const blade=new THREE.Mesh(
      new THREE.BoxGeometry(2.6,.10,.025),
      new THREE.MeshStandardMaterial({color:0x070210,metalness:.97,roughness:.06,emissive:0x000000})
    );
    const handle=new THREE.Mesh(
      new THREE.CylinderGeometry(.06,.06,.85,16),
      new THREE.MeshStandardMaterial({color:0x1a0530,metalness:.5,roughness:.5})
    );
    handle.rotation.z=Math.PI/2; handle.position.x=-1.7;
    const tsuba=new THREE.Mesh(
      new THREE.CylinderGeometry(.18,.18,.04,24),
      new THREE.MeshStandardMaterial({color:0x44188a,metalness:.85,roughness:.25})
    );
    tsuba.rotation.z=Math.PI/2; tsuba.position.x=-1.25;
    const standin=new THREE.Group();
    standin.add(blade,handle,tsuba);
    KAT.add(standin);
    KAT.userData.meshes=[blade,handle,tsuba];
    KAT.userData.model=standin;
    S.modelReady=true;
  }
);

function enhanceMat(m){
  const mat=m.clone();
  if(!mat.emissive) mat.emissive=new THREE.Color(0,0,0);
  const col=mat.color||new THREE.Color(1,1,1);
  const brightness=(col.r+col.g+col.b)/3;
  if(brightness<0.15){
    mat.metalness=0.98;
    mat.roughness=0.04;
    mat.color=new THREE.Color(0.01,0.01,0.02);
  } else if(brightness<0.45){
    mat.metalness=0.85;
    mat.roughness=0.18;
  }
  mat.envMapIntensity=2.2;
  return mat;
}

function drawThrone(scroll,mnx){
  const W=1024,H=1024;
  const sc=Math.min(scroll*1.5,1);
  offX.clearRect(0,0,W,H);
  const bg=offX.createRadialGradient(W/2,H*.28,0,W/2,H*.6,W*.85);
  bg.addColorStop(0,sc>.5?'rgba(70,0,12,.98)':'rgba(30,0,62,.98)');
  bg.addColorStop(.55,'rgba(8,0,22,.99)');
  bg.addColorStop(1,'rgba(0,0,2,1)');
  offX.fillStyle=bg; offX.fillRect(0,0,W,H);

  const shat=Math.min(sc*1.35,1);
  if(shat<.04) drawIntact(offX,W,H,mnx);
  else if(shat<.55){drawIntact(offX,W,H,mnx);drawCracks(offX,W,H,(shat-.04)/.51);}
  else drawShatter(offX,W,H,(shat-.55)/.45,mnx,sc);

  const fi=Math.max(0,sc-.3)/.7;
  if(fi>0){
    const fg=offX.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,W*.55);

    fg.addColorStop(1,'rgba(0,0,0,0)');
    offX.fillStyle=fg; offX.fillRect(0,0,W,H);
  }
  const vg=offX.createRadialGradient(W/2,H/2,W*.15,W/2,H/2,W*.72);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.65)');
  offX.fillStyle=vg; offX.fillRect(0,0,W,H);
}

  c.lineTo(W*.62,H*.08); c.lineTo(W*.71,H*.14); c.lineTo(W*.75,H*.58);

function drawCracks(c,W,H,t){
  const rng=s=>{let x=Math.sin(s)*43758.5;return x-Math.floor(x);};
  const n=Math.floor(t*16)+2;
  for(let i=0;i<n;i++){
    const cx=W*.35+rng(i)*W*.3, cy=H*.18+rng(i+1)*H*.4,
          len=25+t*180*rng(i+2), ang=rng(i+3)*Math.PI*2;
    c.strokeStyle=`rgba(235,190,255,${.42+t*.45})`; c.lineWidth=.8+t; c.lineCap='round';
    c.beginPath(); let x=cx,y=cy; c.moveTo(x,y);
    for(let j=0;j<10;j++){const da=(rng(i*9+j)-.5)*.95;x+=Math.cos(ang+da)*len*.11;y+=Math.sin(ang+da)*len*.11;c.lineTo(x,y);}
    c.stroke();
  }
  if(t>.28){c.fillStyle=`rgba(255,40,0,${(t-.28)*.16})`;c.fillRect(0,0,W,H);}
}
function drawShatter(c,W,H,t,mnx,sc){
  const rng=s=>{let x=Math.sin(s)*43758.5;return x-Math.floor(x);};
  for(let i=0;i<48;i++){
    const r=rng(i+1),r2=rng(i+50),r3=rng(i+100),r4=rng(i+150),r5=rng(i+200);
    const px=r*W+(r2-.5)*t*340+(mnx*(r5-.5)*85);
    const py=r3*H+(1-r4)*t*260;
    const sz=6+r2*60, rot=(r+t*3.5)*Math.PI*4;
    const al=Math.max(0,(1.55-sc*1.25)*.78)*(.3+r*.65);
    c.save(); c.translate(px,py); c.rotate(rot);
    const pg=c.createLinearGradient(-sz,-sz,sz,sz);
    pg.addColorStop(0,`rgba(135,10,250,${al})`);
    pg.addColorStop(1,`rgba(45,0,110,${al*.4})`);
    c.fillStyle=pg;
    const sides=3+Math.floor(r4*3); c.beginPath();
    for(let s=0;s<sides;s++){const a=s/sides*Math.PI*2;s===0?c.moveTo(Math.cos(a)*sz,Math.sin(a)*sz):c.lineTo(Math.cos(a)*sz,Math.sin(a)*sz);}
    c.closePath(); c.fill(); c.restore();
  }
  const rng2=s=>{let x=Math.sin(s*13.7+55)*43758.5;return x-Math.floor(x);};
  for(let i=0;i<14;i++){
    const fx=W*.25+rng2(i)*W*.5, fy=H*.45+rng2(i+4)*H*.2, fr=30+rng2(i+8)*80;
    const fg=c.createRadialGradient(fx,fy,0,fx,fy,fr*t*2.2);
    fg.addColorStop(0,`rgba(255,${Math.floor(95*t)},10,${t*.7})`);
    fg.addColorStop(.5,`rgba(190,0,${Math.floor(60*t)},${t*.32})`);
    fg.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=fg; c.beginPath(); c.arc(fx,fy,fr*t*2.2,0,Math.PI*2); c.fill();
  }
}

/* ═══════════════════════════════════════
   BLADE-MASKED REFLECTION
   The trick: project key blade points to screen,
   build a tight quad, draw throne ONLY inside that quad.
   No more bleed into background.
═══════════════════════════════════════ */
function getBladeQuad(){
  // The blade in act2 is horizontal centered at KAT.position.
  // Model is ~5 units tall scaled to fit. After horizontal rotation (krz=0),
  // blade extends along X. We sample points to build a tight screen-space rect.
  const pts=[];
  // Sample along blade length and across thickness
  const samples=[
    [-2.4,.04,.005],[-2.4,-.04,.005],
    [2.4,.04,.005],[2.4,-.04,.005],
    [0,.06,.005],[0,-.06,.005],
    [-1.2,.05,0],[1.2,.05,0],
    [-1.2,-.05,0],[1.2,-.05,0]
  ];
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  const v=new THREE.Vector3();
  samples.forEach(([x,y,z])=>{
    v.set(x,y,z);
    KAT.localToWorld(v);
    v.project(CAM);
    const sx=(v.x*.5+.5)*innerWidth;
    const sy=(-.5*v.y+.5)*innerHeight;
    if(sx<minX)minX=sx; if(sx>maxX)maxX=sx;
    if(sy<minY)minY=sy; if(sy>maxY)maxY=sy;
  });
  return {x:minX,y:minY,w:maxX-minX,h:maxY-minY};
}

function drawBladeReflection(scroll,nx){
  rfx.clearRect(0,0,innerWidth,innerHeight);
  if(S.refOpacity<.01) return;

  const q=getBladeQuad();
  // Tighten the height a bit so reflection stays inside the blade silhouette
  const padX=q.w*.02;
  const padY=q.h*.18;
  const bx=q.x+padX, by=q.y+padY, bw=q.w-padX*2, bh=q.h-padY*2;
  if(bw<10 || bh<5) return;

  rfx.save();
  // CRITICAL: clip to blade rect so reflection NEVER bleeds outside
  rfx.beginPath();
  rfx.rect(bx,by,bw,bh);
  rfx.clip();

  rfx.globalAlpha=S.refOpacity;

  // Draw throne mapped into the blade rect
  rfx.drawImage(offCv, bx, by, bw, bh);

  // Distortion lines (scanlines suggesting metal striations)
  rfx.globalCompositeOperation='multiply';
  for(let y=by;y<by+bh;y+=2){
    rfx.fillStyle='rgba(40,10,80,.45)';
    rfx.fillRect(bx,y,bw,1);
  }

  // Hamon — the bright temper line down the middle
  rfx.globalCompositeOperation='screen';
  const hY=by+bh*.5;
  const hg=rfx.createLinearGradient(bx,hY-2,bx,hY+2);
  hg.addColorStop(0,'rgba(0,0,0,0)');
  hg.addColorStop(.5,`rgba(230,180,255,${S.refOpacity})`);
  hg.addColorStop(1,'rgba(0,0,0,0)');
  rfx.fillStyle=hg;
  rfx.fillRect(bx,hY-2,bw,4);

  // Edge purple glow
  const eg=rfx.createLinearGradient(bx,by,bx,by+bh);
  eg.addColorStop(0,`rgba(140,40,255,${S.refOpacity*.7})`);
  eg.addColorStop(.15,'rgba(0,0,0,0)');
  eg.addColorStop(.85,'rgba(0,0,0,0)');
  eg.addColorStop(1,`rgba(140,40,255,${S.refOpacity*.7})`);
  rfx.fillStyle=eg;
  rfx.fillRect(bx,by,bw,bh);

  rfx.restore();
}

  skx.fillStyle=sg; skx.fillRect(0,0,W,H);
  const hg=skx.createLinearGradient(0,H*.48,0,H);
  hg.addColorStop(0,'rgba(48,0,95,.0)');
  hg.addColorStop(.5,'rgba(35,0,72,.14)');
  hg.addColorStop(1,'rgba(15,0,38,.3)');
  skx.fillStyle=hg; skx.fillRect(0,0,W,H);
  const mx=W*.76+nx*16, my=H*.16+ny*9, mr=W*.034;
  const mg=skx.createRadialGradient(mx,my,mr*.3,mx,my,mr*5.5);
  mg.addColorStop(0,'rgba(120,50,210,.18)');
  mg.addColorStop(.28,'rgba(75,18,150,.07)');
  mg.addColorStop(1,'rgba(0,0,0,0)');
  skx.fillStyle=mg; skx.fillRect(0,0,W,H);
  const mb=skx.createRadialGradient(mx-mr*.18,my-mr*.18,0,mx,my,mr);
  mb.addColorStop(0,'rgba(210,170,255,.65)');
  mb.addColorStop(.55,'rgba(140,90,225,.42)');
  mb.addColorStop(1,'rgba(70,15,160,.18)');
  skx.fillStyle=mb; skx.beginPath(); skx.arc(mx,my,mr,0,Math.PI*2); skx.fill();
  skx.fillStyle='rgba(3,0,12,.6)'; skx.beginPath();
  skx.arc(mx+mr*.28,my-mr*.08,mr*.88,0,Math.PI*2); skx.fill();
  // ground fog
  const gf=skx.createLinearGradient(0,H*.72,0,H);
  gf.addColorStop(0,'rgba(0,0,0,0)');
  gf.addColorStop(.4,'rgba(8,2,22,.2)');
  gf.addColorStop(1,'rgba(4,0,12,.45)');
  skx.fillStyle=gf; skx.fillRect(0,0,W,H);

  // Drifting clouds (smooth, no boxes)
  const cn=5;
  for(let i=0;i<cn;i++){
    const cx=((t*8+i*innerWidth/cn*1.4)%(innerWidth+400))-200;
    const cy=H*.12+i*30+Math.sin(t*.3+i)*8;
    const cr=80+i*20;

    cg.addColorStop(.5,`rgba(30,8,70,.04)`);
    cg.addColorStop(1,'rgba(0,0,0,0)');
    skx.fillStyle=cg; skx.beginPath(); skx.arc(cx,cy,cr,0,Math.PI*2); skx.fill();
  }
}

function drawFX(windForce){
  fxx.clearRect(0,0,innerWidth,innerHeight);
  glx.clearRect(0,0,innerWidth,innerHeight);

  // Standard petals first
  petals.filter(p=>!p.glass).forEach(p=>{
    p.sw+=p.ss; p.x+=p.vx+Math.sin(p.sw)*p.sa+windForce; p.y+=p.vy; p.rot+=p.rv;
    if(p.y>innerHeight+30||p.x<-50) Object.assign(p,spawnPetal());
    fxx.save(); fxx.translate(p.x,p.y); fxx.rotate(p.rot); fxx.globalAlpha=p.op;
    fxx.fillStyle=p.pink?'rgba(255,160,190,1)':'rgba(238,140,184,1)';
    for(let i=0;i<5;i++){
      fxx.save(); fxx.rotate(i*Math.PI*2/5);
      fxx.beginPath(); fxx.ellipse(0,-p.sz*.52,p.sz*.26,p.sz*.53,0,0,Math.PI*2);
      fxx.fill(); fxx.restore();
    }
    fxx.fillStyle='rgba(255,210,150,.85)'; fxx.beginPath();
    fxx.arc(0,0,p.sz*.12,0,Math.PI*2); fxx.fill();
    fxx.restore();
  });

  // GLASSMORPHIC close-up petals — drawn on glass layer with blur filter
  petals.filter(p=>p.glass).forEach(p=>{
    p.sw+=p.ss; p.x+=p.vx+Math.sin(p.sw)*p.sa*1.5+windForce*1.5; p.y+=p.vy; p.rot+=p.rv*.6;
    if(p.y>innerHeight+60||p.x<-100) Object.assign(p,spawnPetal());

    glx.save();
    glx.translate(p.x,p.y); glx.rotate(p.rot);

    // Frosted glass body
    glx.filter='blur(0.8px)';
    glx.globalAlpha=p.op*.55;
    const bg=glx.createRadialGradient(0,0,0,0,0,p.sz);
    bg.addColorStop(0,'rgba(255,210,230,.35)');
    bg.addColorStop(.6,'rgba(255,170,210,.18)');
    bg.addColorStop(1,'rgba(220,140,200,.04)');
    glx.fillStyle=bg;
    for(let i=0;i<5;i++){
      glx.save(); glx.rotate(i*Math.PI*2/5);
      glx.beginPath(); glx.ellipse(0,-p.sz*.52,p.sz*.26,p.sz*.53,0,0,Math.PI*2);
      glx.fill(); glx.restore();
    }
    glx.filter='none';

    // Glass edge highlight
    glx.globalAlpha=p.op*.9;
    glx.strokeStyle='rgba(255,225,240,.55)';
    glx.lineWidth=.8;
    for(let i=0;i<5;i++){
      glx.save(); glx.rotate(i*Math.PI*2/5);
      glx.beginPath(); glx.ellipse(0,-p.sz*.52,p.sz*.26,p.sz*.53,0,0,Math.PI*2);
      glx.stroke(); glx.restore();
    }

    // Refraction light spot (fake refraction)
    glx.globalAlpha=p.op*.7;
    const sg=glx.createRadialGradient(-p.sz*.15,-p.sz*.3,0,-p.sz*.15,-p.sz*.3,p.sz*.4);
    sg.addColorStop(0,'rgba(255,255,255,.6)');
    sg.addColorStop(1,'rgba(255,255,255,0)');
    glx.fillStyle=sg;
    glx.beginPath(); glx.arc(-p.sz*.15,-p.sz*.3,p.sz*.4,0,Math.PI*2); glx.fill();

    // Center
    glx.fillStyle='rgba(255,200,140,.8)';
    glx.beginPath(); glx.arc(0,0,p.sz*.1,0,Math.PI*2); glx.fill();

    glx.restore();
  });

  // Wind streaks — motion blur lines
  winds.forEach(w=>{
    w.dl--; if(w.dl>0)return;
    w.x+=w.sp; w.li++;
    const prog=w.li/w.mli; w.op=w.mop*Math.sin(prog*Math.PI);
    if(w.li>w.mli) Object.assign(w,{...spawnWind(),x:-180-Math.random()*200});
    fxx.strokeStyle=`rgba(170,120,255,${w.op})`; fxx.lineWidth=.6; fxx.lineCap='round';
    fxx.beginPath();
    fxx.moveTo(w.x,w.y);
    fxx.lineTo(w.x+Math.cos(w.ang)*w.len,w.y+Math.sin(w.ang)*w.len);
    fxx.stroke();
  });

  // Embers — glowing soft circles
  embers.forEach(e=>{
    e.x+=e.vx; e.y+=e.vy; e.fl+=e.fs;
    const op=e.op*(0.5+0.5*Math.sin(e.fl));
    if(e.y<-10) e.y=innerHeight+8;
    if(e.x<-8) e.x=innerWidth+8;
    if(e.x>innerWidth+8) e.x=-8;
    const eg=fxx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r*4);
    eg.addColorStop(0,`rgba(200,100,255,${op})`);
    eg.addColorStop(.4,`rgba(140,40,220,${op*.4})`);
    eg.addColorStop(1,'rgba(85,0,180,0)');
    fxx.fillStyle=eg; fxx.beginPath(); fxx.arc(e.x,e.y,e.r*4,0,Math.PI*2); fxx.fill();
  });
}

/* ═══════════════════════════════════════
   HAKI TENDRILS (2D)
═══════════════════════════════════════ */
function drawHaki(I,bx,by){
  hkx.clearRect(0,0,innerWidth,innerHeight);
  if(I<.01) return;
  const n=Math.floor(I*14);
  for(let i=0;i<n;i++){
    const rng=s=>{let x=Math.sin(s*17.3+i*37.1)*43758.5;return x-Math.floor(x);};
    const ang=rng(1)*Math.PI*2, len=35+rng(2)*180*I;
    hkx.strokeStyle=`rgba(35,5,75,${.55+I*.45})`; hkx.lineWidth=1.6+I*.9; hkx.lineCap='round';
    hkx.beginPath(); let x=bx,y=by; hkx.moveTo(x,y);
    for(let j=0;j<10;j++){
      const da=(rng(j*3+3)-.5)*1.25;
      x+=Math.cos(ang+da)*len*.11; y+=Math.sin(ang+da)*len*.11;
      hkx.lineTo(x,y);
    }
    hkx.stroke();
    hkx.strokeStyle=`rgba(140,40,230,${.18+I*.22})`; hkx.lineWidth=.55; hkx.stroke();
  }
  const cg=hkx.createRadialGradient(bx,by,0,bx,by,90*I);
  cg.addColorStop(0,`rgba(80,20,180,${I*.4})`);
  cg.addColorStop(.5,`rgba(40,5,90,${I*.16})`);
  cg.addColorStop(1,'rgba(0,0,0,0)');
  hkx.fillStyle=cg; hkx.fillRect(0,0,innerWidth,innerHeight);
}

/* ═══════════════════════════════════════
   LIGHTNING ARCS — branching electricity
═══════════════════════════════════════ */
function spawnLightning(){
  if(S.phase==='ACT1'||S.phase==='LOAD') return;
  const bp=bladeScreen();
  // Lightning emanates from blade outward
  const angle=Math.random()*Math.PI*2;
  const dist=80+Math.random()*220;
  const ex=bp.x+Math.cos(angle)*dist;
  const ey=bp.y+Math.sin(angle)*dist;
  S.lightning.push({
    x1:bp.x, y1:bp.y, x2:ex, y2:ey,
    life:1, decay:.045+Math.random()*.025,
    branches:Math.floor(Math.random()*3)+1,
    seed:Math.random()*1000
  });
}
function drawLightningBolt(x1,y1,x2,y2,detail,seed){
  const segs=[[x1,y1]];
  let prevX=x1, prevY=y1;
  const N=12;
  const rng=s=>{let x=Math.sin(s+seed)*43758.5; return x-Math.floor(x);};
  for(let i=1;i<N;i++){
    const t=i/N;
    const tx=x1+(x2-x1)*t;
    const ty=y1+(y2-y1)*t;
    const offset=detail*(rng(i*3.7)-.5)*40;
    const perpX=-(y2-y1), perpY=(x2-x1);
    const pl=Math.hypot(perpX,perpY);
    const px=perpX/pl, py=perpY/pl;
    segs.push([tx+px*offset, ty+py*offset]);
    prevX=tx; prevY=ty;
  }
  segs.push([x2,y2]);
  return segs;
}
function drawLightning(){
  lgx.clearRect(0,0,innerWidth,innerHeight);
  S.lightning=S.lightning.filter(b=>b.life>0);
  S.lightning.forEach(b=>{
    b.life-=b.decay;
    const op=Math.max(0,b.life);
    const segs=drawLightningBolt(b.x1,b.y1,b.x2,b.y2,b.life,b.seed);

    // Outer glow
    lgx.strokeStyle=`rgba(180,80,255,${op*.4})`;
    lgx.lineWidth=8; lgx.lineCap='round'; lgx.lineJoin='round';
    lgx.beginPath();
    segs.forEach((p,i)=>i?lgx.lineTo(p[0],p[1]):lgx.moveTo(p[0],p[1]));
    lgx.stroke();

    // Mid glow
    lgx.strokeStyle=`rgba(220,140,255,${op*.7})`;
    lgx.lineWidth=3;
    lgx.beginPath();
    segs.forEach((p,i)=>i?lgx.lineTo(p[0],p[1]):lgx.moveTo(p[0],p[1]));
    lgx.stroke();

    // Hot core
    lgx.strokeStyle=`rgba(255,240,255,${op})`;
    lgx.lineWidth=1.2;
    lgx.beginPath();
    segs.forEach((p,i)=>i?lgx.lineTo(p[0],p[1]):lgx.moveTo(p[0],p[1]));
    lgx.stroke();

    // Branches
    for(let k=0;k<b.branches;k++){
      const startIdx=Math.floor(segs.length*(.3+k*.2));
      if(startIdx>=segs.length-1) continue;
      const sp=segs[startIdx];
      const bAng=Math.atan2(b.y2-b.y1,b.x2-b.x1) + (Math.random()-.5)*1.6;
      const bLen=40+Math.random()*60;
      const bx2=sp[0]+Math.cos(bAng)*bLen;
      const by2=sp[1]+Math.sin(bAng)*bLen;
      const bSegs=drawLightningBolt(sp[0],sp[1],bx2,by2,b.life*.8,b.seed+k*7);

      lgx.strokeStyle=`rgba(180,80,255,${op*.3})`;
      lgx.lineWidth=4;
      lgx.beginPath();
      bSegs.forEach((p,i)=>i?lgx.lineTo(p[0],p[1]):lgx.moveTo(p[0],p[1]));
      lgx.stroke();

      lgx.strokeStyle=`rgba(255,220,255,${op*.85})`;
      lgx.lineWidth=.9;
      lgx.beginPath();
      bSegs.forEach((p,i)=>i?lgx.lineTo(p[0],p[1]):lgx.moveTo(p[0],p[1]));
      lgx.stroke();
    }
  });
}

/* ═══════════════════════════════════════
   FIRE PARTICLES (2D)
═══════════════════════════════════════ */
function spawnFire(x1,y1,x2,y2){
  for(let i=0;i<200;i++){
    const t=i/199;
    setTimeout(()=>{
      S.fp.push({
        x:x1+(x2-x1)*t+(Math.random()-.5)*16,
        y:y1+(y2-y1)*t+(Math.random()-.5)*10,
        vx:(Math.random()-.5)*3.2, vy:-(1+Math.random()*3.6),
        l:1, d:.006+Math.random()*.022, sz:5+Math.random()*16,
        e:Math.random()>.4
      });
    },t*300);
  }
}
function drawFire(){
  frx.clearRect(0,0,innerWidth,innerHeight);
  S.fp=S.fp.filter(p=>p.l>0);
  S.fp.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vx*=.97; p.vy-=.022; p.l-=p.d;
    const op=Math.max(0,p.l);
    if(p.e){
      frx.fillStyle=Math.random()>.5
        ?`rgba(255,${Math.floor(75+150*p.l)},${Math.floor(220*Math.max(0,p.l-.5))},${op*.95})`
        :`rgba(185,${Math.floor(45*p.l)},255,${op*.85})`;
      frx.beginPath(); frx.arc(p.x,p.y,p.sz*.42,0,Math.PI*2); frx.fill();
    } else {
      const rg=frx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.sz);
      rg.addColorStop(0,`rgba(255,255,${Math.floor(56*p.l)},${op*.95})`);
      rg.addColorStop(.4,`rgba(255,${Math.floor(56+140*p.l)},20,${op*.7})`);
      rg.addColorStop(.8,`rgba(155,10,210,${op*.35})`);
      rg.addColorStop(1,'rgba(28,0,48,0)');
      frx.fillStyle=rg; frx.beginPath(); frx.arc(p.x,p.y,p.sz,0,Math.PI*2); frx.fill();
    }
  });
}

/* ═══════════════════════════════════════
   DRAG LINE
═══════════════════════════════════════ */
function drawDrag(){
  drx.clearRect(0,0,innerWidth,innerHeight);
  if(!S.drag.on||S.phase!=='ACT1') return;
  const{sx,sy,cx,cy}=S.drag;
  if(Math.hypot(cx-sx,cy-sy)<12) return;
  const gr=drx.createLinearGradient(sx,sy,cx,cy);
  gr.addColorStop(0,'rgba(120,30,255,0)');
  gr.addColorStop(.3,'rgba(140,50,255,.55)');
  gr.addColorStop(.8,'rgba(200,130,255,.9)');
  gr.addColorStop(1,'rgba(255,255,255,1)');
  drx.beginPath(); drx.moveTo(sx,sy); drx.lineTo(cx,cy);
  drx.strokeStyle=gr; drx.lineWidth=3.5; drx.lineCap='round';
  drx.shadowBlur=24; drx.shadowColor='rgba(140,40,255,.85)';
  drx.stroke(); drx.shadowBlur=0;
}

function chkSlice(){
  if(S.sliced) return;
  if(Math.hypot(S.drag.cx-S.drag.sx,S.drag.cy-S.drag.sy)>Math.min(innerWidth*.17,115))
    doSlice();

function doSlice(){
  if(S.sliced) return;
  S.sliced=true; S.phase='SLICING'; S.drag.on=false; CUR.classList.remove('s');
  drx.clearRect(0,0,innerWidth,innerHeight);
  const cy=innerHeight*.5, hw=innerWidth*.55, r=18*Math.PI/180;
  spawnFire(innerWidth*.5-hw,cy-Math.tan(r)*hw,innerWidth*.5+hw,cy+Math.tan(r)*hw);

  // Lightning burst on slice
  for(let i=0;i<8;i++) setTimeout(spawnLightning, i*40);

  const fl=document.getElementById('fl');

  // Bloom flare on slice
  if(bloomPass){
    tw(bloomPass,{strength:2.2},.15,'o',()=>tw(bloomPass,{strength:.85},.7,'o'));

  setTimeout(()=>{
    tw(S,{ptRX:-Math.PI*.62,ptPY:.7},1.0,'o');
    tw(S,{pbRX:Math.PI*.62,pbPY:-.7},1.0,'o');

}

/* ═══════════════════════════════════════
   MAIN LOOP
═══════════════════════════════════════ */
function bladeScreen(){
  const v=new THREE.Vector3(KAT.position.x,KAT.position.y,KAT.position.z);
  v.project(CAM);
  return{x:(v.x*.5+.5)*innerWidth,y:(-.5*v.y+.5)*innerHeight};
}

let lightningTimer=0;
function loop(ts){
  requestAnimationFrame(loop);
  S.dt=Math.min((ts-S.lt)*.001,.055); S.lt=ts; S.t+=S.dt;
  stepTw(S.dt);

  const windForce=Math.sin(S.t*.32)*1.3;

  // Sky always
  drawSky(S.nx,S.ny,S.t);

  // Petals/embers
  if(S.phase==='ACT1'||S.phase==='LOAD') drawFX(windForce);
  else { fxx.clearRect(0,0,innerWidth,innerHeight); glx.clearRect(0,0,innerWidth,innerHeight); }

  drawFire();
  drawDrag();

  // Haki
  if(S.phase!=='ACT1'&&S.phase!=='LOAD'&&S.hI>.01){
    const bp=bladeScreen();
    drawHaki(S.hI,bp.x,bp.y);
  } else hkx.clearRect(0,0,innerWidth,innerHeight);

  // Lightning — fires during act2 close-up onward
  if(S.phase==='ACT2_CLOSE'||S.phase==='ACT2_SCROLL'||S.phase==='ACT3'){
    lightningTimer-=S.dt;
    if(lightningTimer<=0){
      spawnLightning();
      lightningTimer=.35+Math.random()*.6;
    }
  }
  drawLightning();

  // Paper
  if(PG.visible){
    PT.rotation.x=S.ptRX; PT.position.y=S.ptPY;
    PB.rotation.x=S.pbRX; PB.position.y=S.pbPY;
    if(S.phase==='ACT1'){
      PG.rotation.y=Math.sin(S.t*.38)*.013+S.nx*.015;
      PG.rotation.x=S.ny*.01;
    }
  }

  // Katana
  if(S.phase==='ACT1'){
    const tx=.20+S.nx*.16, ty=S.ny*.11, tz=.55+S.ny*.06;
    S.kx+=(tx-S.kx)*.05; S.ky+=(ty-S.ky)*.05; S.kz+=(tz-S.kz)*.05;
    S.ky+=Math.sin(S.t*.85)*.003;
    if(Math.random()<.0006){
      tw(S,{aI:.55},.18,'o',()=>tw(S,{aI:0},.7,'o'));
    }
  }
  KAT.position.set(S.kx, S.ky+Math.sin(S.t*.7)*.0025, S.kz);
  KAT.rotation.set(S.krx, S.kry, S.krz);

  // Aura particles
  if(KAT.userData.dustGeo){
    const dp=KAT.userData.dustGeo.attributes.position.array;
    for(let i=0;i<dp.length;i+=3){
      dp[i]+=(Math.random()-.5)*.005;
      dp[i+1]+=(Math.random()-.5)*.009;
      dp[i+2]+=(Math.random()-.5)*.005;
      if(Math.abs(dp[i])>.7)dp[i]*=.94;
      if(Math.abs(dp[i+1])>3.2)dp[i+1]*=.94;
      if(Math.abs(dp[i+2])>.22)dp[i+2]*=.94;
    }
    KAT.userData.dustGeo.attributes.position.needsUpdate=true;
    const target=(S.phase==='ACT1') ? S.aI*.55
                 : (S.phase==='ACT2_CLOSE'||S.phase==='ACT2_SCROLL') ? S.gI*.6
                 : S.phase==='ACT3' ? .8 : 0;
    KAT.userData.dustMat.opacity += (target - KAT.userData.dustMat.opacity)*.05;
  }

  // Emissive
  if(KAT.userData.meshes){
    const basePulse=Math.sin(S.t*2.1)*.15;
    const edgePow=S.edgeGlow*(0.85+basePulse*.18);
    const ambPow=S.gI*.1+S.aI*.05;
    KAT.userData.meshes.forEach(m=>{
      const mats=Array.isArray(m.material)?m.material:[m.material];
      mats.forEach(mat=>{
        if(!mat?.emissive) return;
        const col=mat.color||new THREE.Color(1,1,1);
        const brightness=(col.r+col.g+col.b)/3;
        if(brightness<0.15){
          mat.emissive.setRGB(ambPow*.05, 0, ambPow*.1+edgePow*.18);
        } else {
          mat.emissive.setRGB(ambPow*.08, 0, ambPow*.18+edgePow*.12);
        }
      });
    });
  }

  edgeL.intensity=S.edgeGlow*4.0+Math.sin(S.t*3.2)*.4*S.edgeGlow;
  edgeL.position.set(KAT.position.x, KAT.position.y, KAT.position.z+.4);
  envL.intensity=S.gI*4.2+S.aI*1.6;
  envL.position.copy(KAT.position);
  bladeSpot.target.position.copy(KAT.position);
  bladeSpot2.target.position.copy(KAT.position);

  // Scroll smoothing + auto-act3 trigger
  if(S.phase==='ACT2_SCROLL'||S.phase==='ACT2_CLOSE'){
    S.sp += (S.scrollTarget-S.sp)*.08;
    document.getElementById('spf').style.height=(S.sp*100)+'%';
    drawThrone(S.sp,S.nx*.12);
    S.hI=Math.max(S.hI,.65+S.sp*.85);
    S.edgeGlow=Math.max(S.edgeGlow,.85+S.sp*.15);
    S.refOpacity=Math.min(.82, .65+S.sp*.2);
    if(bloomPass) bloomPass.strength=Math.min(2.0, .9+S.sp*1.0);
    if(S.sp>.92 && S.phase==='ACT2_SCROLL') startAct3();
  }

  // Reflection — only in act 2 close+scroll
  if(S.phase==='ACT2_CLOSE'||S.phase==='ACT2_SCROLL'){
    drawBladeReflection(S.sp, S.nx*.12);
  } else {
    rfx.clearRect(0,0,innerWidth,innerHeight);
  }

  // Camera
  CAM.position.set(
    S.phase==='ACT1' ? S.camX+S.nx*.07 : S.camX,
    S.phase==='ACT1' ? S.camY+S.ny*.05 : S.camY,
    S.camZ
  );
  CAM.lookAt(0,0,0);

  // Parallax mountains
  mtnGrp.children.forEach(m=>{
    m.position.x+=((S.nx*m.userData.pf*.7)-m.position.x)*.04;
    m.position.y+=((-S.ny*m.userData.pf*.22)-m.position.y)*.04;
  });
  mistGrp.children.forEach(m=>{
    m.position.x=Math.sin(S.t*m.userData.sp+m.userData.ph)*m.userData.amp*10+S.nx*.1;
  });
  rayGrp.children.forEach(r=>{
    r.material.opacity=r.userData.bo*(.4+.6*Math.sin(S.t*.65+r.userData.ph));
  });

  R.toneMappingExposure=.85+S.gI*.55+S.edgeGlow*.18;

  // Render via composer (with bloom + motion blur) when available
  R.clear();
  if(composer){
    composer.render(S.dt);
  } else {
    R.render(SC,CAM);
  }
}

/* ═══════════════════════════════════════
   LOADER
═══════════════════════════════════════ */
const lfEl=document.getElementById('lf');
let lp=0;
const li=setInterval(()=>{
  lp+=2+Math.random()*9; lfEl.style.width=Math.min(lp,85)+'%';
  if(lp>=85) clearInterval(li);
},88);

function go(){
  lfEl.style.width='100%';
  setTimeout(()=>{
    document.getElementById('ld').classList.add('out');
    S.phase='ACT1';
    S.lt=performance.now();
    requestAnimationFrame(loop);
  },620);
}

const poll=setInterval(()=>{
  if(S.modelReady){clearInterval(poll); go();}
},110);
setTimeout(()=>{if(!S.modelReady) S.modelReady=true;},7000);
</script>

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sumanth · 斬鉄剣</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;cursor:none;background:#000;}
canvas{position:fixed;top:0;left:0;display:block;}
#sky{z-index:1;}
#gl{z-index:2;}
#fx{z-index:3;pointer-events:none;}
#hk{z-index:4;pointer-events:none;}
#fr{z-index:5;pointer-events:none;}
#dr{z-index:6;}
#off{display:none;}
#cur{position:fixed;z-index:500;pointer-events:none;width:18px;height:18px;
  border-radius:50%;border:1.5px solid rgba(160,70,255,.9);
  transform:translate(-50%,-50%);
  box-shadow:0 0 14px rgba(120,30,220,.5);transition:all .1s;}
#cur.s{width:5px;height:5px;background:rgba(160,70,255,1);
  border-color:transparent;box-shadow:0 0 22px rgba(160,70,255,.9);}
#fl{position:fixed;inset:0;z-index:400;opacity:0;pointer-events:none;}

/* LOADER */
#ld{position:fixed;inset:0;z-index:600;
background:radial-gradient(ellipse 100% 100% at 50% 38%,#0c0220 0%,#03000e 55%,#000104 100%);
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
transition:opacity 1.2s;}
#ld.out{opacity:0;pointer-events:none;}
.lk{font-family:‘Cinzel Decorative’,serif;font-size:clamp(44px,9vw,98px);
color:rgba(150,60,255,.7);letter-spacing:10px;animation:kpulse 1.9s ease-in-out infinite;}
@keyframes kpulse{0%,100%{opacity:.3;}50%{opacity:1;text-shadow:0 0 50px rgba(130,40,220,.7),0 0 90px rgba(80,0,190,.3);}}
.lb{width:210px;height:1px;background:rgba(130,40,220,.14);overflow:hidden;}
.lf{height:100%;background:linear-gradient(90deg,#3800a0,#b050ff);width:0;transition:width .2s;}
.lt{font-family:‘JetBrains Mono’,monospace;font-size:8px;letter-spacing:5px;
color:rgba(150,60,255,.32);text-transform:uppercase;}
#lerr{display:none;font-family:‘JetBrains Mono’,monospace;font-size:8px;
color:rgba(255,80,80,.5);letter-spacing:3px;text-align:center;margin-top:4px;}

/* UI LAYERS */
.ul{position:fixed;inset:0;z-index:30;pointer-events:none;
display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:9vh;}
#u1{transition:opacity .7s;}
#u2{opacity:0;transition:opacity 1s;}
#u2.on{opacity:1;}
.jt{font-family:‘JetBrains Mono’,monospace;font-size:8.5px;letter-spacing:6px;
color:rgba(150,70,255,.42);text-transform:uppercase;margin-bottom:9px;}
.gt{font-family:‘Cinzel’,serif;font-size:clamp(11px,1.6vw,15px);letter-spacing:10px;
text-transform:uppercase;color:rgba(175,110,255,.62);
position:relative;display:inline-block;animation:gb 3s ease-in-out infinite;}
.gt::before,.gt::after{content:attr(data-t);position:absolute;left:0;top:0;font:inherit;letter-spacing:inherit;}
.gt::before{color:rgba(200,0,50,.32);animation:ga 3s infinite;clip-path:polygon(0 0,100% 0,100% 40%,0 40%);}
.gt::after{color:rgba(0,80,210,.18);animation:gc 3s infinite;clip-path:polygon(0 62%,100% 62%,100% 100%,0 100%);}
@keyframes gb{0%,100%{opacity:.55;}50%{opacity:1;}}
@keyframes ga{0%,82%,100%{transform:none;}84%{transform:translateX(-5px) skewX(-6deg);}88%{transform:translateX(4px);}92%{transform:none;}96%{transform:translateX(4px) skewX(-2deg);}98%{transform:none;}}
@keyframes gc{0%,82%,100%{transform:none;}85%{transform:translateX(5px) skewX(4deg);}89%{transform:translateX(-4px);}93%{transform:none;}97%{transform:translateX(-3px);}99%{transform:none;}}
.sc{font-family:‘JetBrains Mono’,monospace;font-size:8px;letter-spacing:5px;
color:rgba(160,80,255,.45);text-transform:uppercase;
display:flex;flex-direction:column;align-items:center;gap:9px;}
.sc::after{content:’’;width:1px;height:42px;
background:linear-gradient(to bottom,rgba(160,80,255,.5),transparent);}

/* BLADE STATS */
#bs{position:fixed;right:5vw;top:50%;transform:translateY(-50%);z-index:35;
pointer-events:none;opacity:0;transition:opacity 1s;}
#bs.on{opacity:1;}
.sb{display:flex;flex-direction:column;gap:16px;}
.sl{font-family:‘JetBrains Mono’,monospace;font-size:7px;letter-spacing:4px;
text-transform:uppercase;color:rgba(160,80,255,.35);margin-bottom:2px;display:block;}
.sv{font-family:‘Cinzel’,serif;font-size:12.5px;color:rgba(215,170,255,.8);}
.sd{width:1px;height:34px;background:linear-gradient(to bottom,rgba(160,80,255,.26),transparent);margin-left:5px;}

/* SCROLL PROGRESS */
#sp{position:fixed;left:5vw;top:50%;transform:translateY(-50%);z-index:35;
pointer-events:none;opacity:0;transition:opacity 1s;
display:flex;flex-direction:column;align-items:center;gap:6px;}
#sp.on{opacity:1;}
.spt{font-family:‘JetBrains Mono’,monospace;font-size:7px;letter-spacing:3px;
color:rgba(150,70,255,.3);text-transform:uppercase;}
#spb{width:1px;height:120px;background:rgba(150,70,255,.15);position:relative;}
#spf{position:absolute;top:0;left:0;width:1px;background:linear-gradient(to bottom,rgba(200,100,255,.8),rgba(100,0,200,.3));
height:0%;transition:height .3s;}

/* ACT 3 */
#a3{position:fixed;inset:0;z-index:100;
background:radial-gradient(ellipse 100% 100% at 50% 35%,#110228 0%,#060118 50%,#010006 100%);
opacity:0;pointer-events:none;transition:opacity 1.6s;
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
#a3.on{opacity:1;pointer-events:all;}
.a3t{font-family:‘Cinzel Decorative’,serif;font-size:clamp(22px,5.5vw,78px);
color:rgba(195,135,255,.95);text-align:center;
text-shadow:0 0 60px rgba(150,50,255,.55),0 0 120px rgba(110,0,200,.28);}
.a3s{font-family:‘JetBrains Mono’,monospace;font-size:9px;letter-spacing:5px;
color:rgba(150,70,255,.38);text-transform:uppercase;}
</style>

</head>
<body>
<canvas id="sky"></canvas>
<canvas id="gl"></canvas>
<canvas id="fx"></canvas>
<canvas id="hk"></canvas>
<canvas id="fr"></canvas>
<canvas id="dr"></canvas>
<canvas id="off" width="1024" height="1024"></canvas>
<div id="cur"></div>
<div id="fl"></div>

<div id="ld">
  <div class="lk">刀</div>
  <div class="lb"><div class="lf" id="lf"></div></div>
  <div class="lt" id="lt">Forging · 鍛造</div>
  <div id="lerr"></div>
</div>

<div class="ul" id="u1">
  <span class="jt">斬れ · 鬼殺し</span>
  <span class="gt" data-t="DRAW · AND · SLASH">DRAW &nbsp;·&nbsp; AND &nbsp;·&nbsp; SLASH</span>
</div>
<div class="ul" id="u2">
  <div class="sc"><span>続く · Scroll to reveal</span></div>
</div>

<div id="bs">
  <div class="sb">
    <div><span class="sl">Blade · 刀身</span><span class="sv">Black Obsidian</span></div>
    <div class="sd"></div>
    <div><span class="sl">Edge · 刃</span><span class="sv">Cursed Purple</span></div>
    <div class="sd"></div>
    <div><span class="sl">Haki · 覇気</span><span class="sv">Conqueror's</span></div>
    <div class="sd"></div>
    <div><span class="sl">Rank · 位</span><span class="sv">Demon Slayer</span></div>
  </div>
</div>

<div id="sp">
  <div class="spt">Reveal</div>
  <div id="spb"><div id="spf"></div></div>
  <div class="spt">破壊</div>
</div>

<div id="a3">
  <div class="a3t">世界を創る者</div>
  <div class="a3s">— The One Who Creates Worlds —</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
/* ═══════ CANVAS SETUP ═══════ */
const W=()=>innerWidth, H=()=>innerHeight;
const skyC=document.getElementById('sky'), fxC=document.getElementById('fx'),
      hkC=document.getElementById('hk'),  frC=document.getElementById('fr'),
      drC=document.getElementById('dr');
[skyC,fxC,hkC,frC,drC].forEach(c=>{c.width=W();c.height=H();});
const skx=skyC.getContext('2d'),fxx=fxC.getContext('2d'),
      hkx=hkC.getContext('2d'),frx=frC.getContext('2d'),drx=drC.getContext('2d');
window.addEventListener('resize',()=>{
  [skyC,fxC,hkC,frC,drC].forEach(c=>{c.width=W();c.height=H();});
  R.setSize(W(),H());CAM.aspect=W()/H();CAM.updateProjectionMatrix();
});

/* ═══════ STATE ═══════ */
const S={
  phase:'LOAD',t:0,dt:0,lt:0,
  nx:0,ny:0,mx:0,my:0,
  drag:{on:false,sx:0,sy:0,cx:0,cy:0},
  sv:0,sp:0,
  kx:0,ky:0,kz:.65,
  krx:0,kry:0,krz:Math.PI/2,
  camX:0,camY:0,camZ:7,
  ptRX:0,ptPY:0,pbRX:0,pbPY:0,
  gI:0,aI:0,hI:0,
  tw:[],fp:[],
  sliced:false,modelReady:false,
};

/* ═══════ TWEENS ═══════ */
function ease(t,m='io'){return m==='o'?1-Math.pow(1-t,3):m==='i'?t*t*t:t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function tw(o,to,d,m='io',cb){const fr={};for(const k in to)fr[k]=o[k];S.tw.push({o,fr,to,d,m,el:0,cb});}
function stepTw(dt){
  for(let i=S.tw.length-1;i>=0;i--){
    const t=S.tw[i];t.el=Math.min(t.el+dt,t.d);
    const p=ease(t.el/t.d,t.m);
    for(const k in t.to)t.o[k]=t.fr[k]+(t.to[k]-t.fr[k])*p;
    if(t.el>=t.d){if(t.cb)t.cb();S.tw.splice(i,1);}
  }
}

/* ═══════ THREE.JS ═══════ */
const R=new THREE.WebGLRenderer({canvas:document.getElementById('gl'),antialias:true,alpha:true});
R.setPixelRatio(Math.min(devicePixelRatio,2));R.setSize(W(),H());
R.toneMapping=THREE.ACESFilmicToneMapping;R.toneMappingExposure=1.1;
R.shadowMap.enabled=true;R.shadowMap.type=THREE.PCFSoftShadowMap;
R.setClearColor(0x000000,0);
const SC=new THREE.Scene();SC.fog=new THREE.FogExp2(0x04000f,.02);
const CAM=new THREE.PerspectiveCamera(55,W()/H(),.001,500);CAM.position.set(0,0,7);

/* ── LIGHTS ── */
SC.add(new THREE.AmbientLight(0x06021c,1.3));
const dL=new THREE.DirectionalLight(0x4818a8,2.8);
dL.position.set(-2,5,4);dL.castShadow=true;dL.shadow.mapSize.set(2048,2048);SC.add(dL);
SC.add(Object.assign(new THREE.DirectionalLight(0x1c0448,1.5),{position:new THREE.Vector3(5,-2,-3)}));
SC.add(Object.assign(new THREE.DirectionalLight(0x300860,.8),{position:new THREE.Vector3(0,-5,2)}));
const eL=new THREE.PointLight(0x6600cc,0,10);SC.add(eL);
const aL=new THREE.PointLight(0x4400aa,0,14);SC.add(aL);
const tL=new THREE.PointLight(0x8822ee,0,6);SC.add(tL);
const bR=new THREE.SpotLight(0x8844ee,0,9,.85,.6,2);bR.position.set(0,1.2,1);SC.add(bR);
const bR2=new THREE.SpotLight(0x2200aa,0,9,.85,.6,2);bR2.position.set(0,-1.2,.8);SC.add(bR2);

/* ── MOON (Three.js sprite) ── */
const moonSprite=new THREE.Mesh(
  new THREE.SphereGeometry(.55,24,24),
  new THREE.MeshBasicMaterial({color:0x180830,transparent:true,opacity:.0}) // drawn on 2D
);SC.add(moonSprite);

/* ── STARS ── */
const sGeo=new THREE.BufferGeometry();
const sP=new Float32Array(900*3);
for(let i=0;i<900;i++){sP[i*3]=(Math.random()-.5)*80;sP[i*3+1]=Math.random()*22-3;sP[i*3+2]=(Math.random()-.5)*30-8;}
sGeo.setAttribute('position',new THREE.BufferAttribute(sP,3));
const sMat=new THREE.PointsMaterial({color:0xccaaff,size:.05,transparent:true,opacity:.55,blending:THREE.AdditiveBlending,depthWrite:false});
SC.add(new THREE.Points(sGeo,sMat));

/* ── MOUNTAINS (parallax group) ── */
const mtnGrp=new THREE.Group();SC.add(mtnGrp);
function addMtn(h,w,sg,col,z,xo,op){
  const g=new THREE.PlaneGeometry(w,h,sg,1);
  const p=g.attributes.position;
  for(let i=0;i<p.count;i++){
    const vx=p.getX(i),vy=p.getY(i);
    if(vy>-h*.3){
      const n=(vx/w+.5);
      const pk=Math.sin(n*Math.PI)*h*.5+Math.sin(n*Math.PI*3.1)*.15*h+Math.sin(n*Math.PI*8)*.03*h+Math.sin(n*Math.PI*16)*.012*h;
      p.setY(i,Math.max(-h*.5,vy+pk));
    }
  }
  g.computeVertexNormals();
  const m=new THREE.Mesh(g,new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:op,depthWrite:false}));
  m.position.set(xo,-2.8+Math.random()*.4,z);
  m.userData.pf=.55+z*.04;
  mtnGrp.add(m);
}
addMtn(13,65,130,0x020008,-16,0,.99);
addMtn(10,45,100,0x040012,-11,-1,.93);
addMtn(7,34,75, 0x070222,-7,1.5,.83);
addMtn(5,26,58, 0x0a0332,-4,-1.5,.7);
addMtn(4,18,42, 0x0e0448,-2,.5,.55);

/* ── MIST ── */
const mistGrp=new THREE.Group();SC.add(mistGrp);
for(let i=0;i<7;i++){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(55,3.5+i*.5),
    new THREE.MeshBasicMaterial({color:0x12033a,transparent:true,opacity:.025+i*.011,depthWrite:false,blending:THREE.AdditiveBlending}));
  m.position.set(0,-1+i*.48,-9+i*1.2);
  m.userData={sp:.0004+i*.0001,amp:.4+i*.06,ph:Math.random()*Math.PI*2};
  mistGrp.add(m);
}

/* ── GOD RAYS ── */
const rayGrp=new THREE.Group();SC.add(rayGrp);
for(let i=0;i<9;i++){
  const a=-Math.PI*.17+i*(Math.PI*.044);
  const m=new THREE.Mesh(new THREE.ConeGeometry(.06+Math.random()*.055,28,3,1,true),
    new THREE.MeshBasicMaterial({color:0x4a0088,transparent:true,opacity:.011+Math.random()*.021,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.DoubleSide}));
  m.position.set(Math.sin(a)*3,9.5,-6.5);m.rotation.z=a;
  m.userData={ph:Math.random()*Math.PI*2,bo:m.material.opacity};
  rayGrp.add(m);
}

/* ── PAPER SCROLL ── */
function mkPaperTex(){
  const cv=document.createElement('canvas');cv.width=900;cv.height=1500;
  const c=cv.getContext('2d');
  const g=c.createLinearGradient(0,0,900,1500);
  g.addColorStop(0,'#ede2c8');g.addColorStop(.5,'#e2cfa4');g.addColorStop(1,'#d6bb8a');
  c.fillStyle=g;c.fillRect(0,0,900,1500);
  for(let i=0;i<20000;i++){c.fillStyle=`rgba(55,28,4,${Math.random()*.04})`;c.fillRect(Math.random()*900,Math.random()*1500,1,1);}
  for(let i=0;i<18;i++){const ax=Math.random()*900,ay=Math.random()*1500,ar=15+Math.random()*85;const ag=c.createRadialGradient(ax,ay,0,ax,ay,ar);ag.addColorStop(0,`rgba(70,40,8,${.04+Math.random()*.055})`);ag.addColorStop(1,'rgba(70,40,8,0)');c.fillStyle=ag;c.beginPath();c.arc(ax,ay,ar,0,Math.PI*2);c.fill();}
  c.strokeStyle='rgba(72,38,6,.45)';c.lineWidth=3.5;c.strokeRect(20,20,860,1460);
  c.strokeStyle='rgba(72,38,6,.18)';c.lineWidth=1.5;c.strokeRect(30,30,840,1440);
  [[20,20,1,1],[880,20,-1,1],[20,1480,1,-1],[880,1480,-1,-1]].forEach(([x,y,sx,sy])=>{c.strokeStyle='rgba(72,38,6,.58)';c.lineWidth=3;c.beginPath();c.moveTo(x,y);c.lineTo(x+sx*26,y);c.moveTo(x,y);c.lineTo(x,y+sy*26);c.stroke();});
  c.textAlign='center';
  c.font='bold 85px serif';c.fillStyle='rgba(11,3,1,.72)';
  ['世','界','を','創','る','者'].forEach((k,i)=>c.fillText(k,660,88+i*95));
  c.font='72px serif';c.fillStyle='rgba(11,3,1,.5)';
  ['三','次','元','の','建','築','家'].forEach((k,i)=>c.fillText(k,470,90+i*82));
  c.font='58px serif';c.fillStyle='rgba(11,3,1,.28)';
  ['ス','マ','ン','ス'].forEach((k,i)=>c.fillText(k,270,112+i*66));
  c.save();c.translate(195,1390);c.rotate(-.055);
  c.strokeStyle='rgba(125,12,12,.78)';c.lineWidth=3.5;c.strokeRect(-38,-30,76,60);
  c.strokeStyle='rgba(125,12,12,.28)';c.lineWidth=1.5;c.strokeRect(-26,-20,52,40);
  c.font='bold 40px serif';c.fillStyle='rgba(125,12,12,.75)';c.fillText('印',0,14);c.restore();
  c.fillStyle='rgba(55,20,95,.07)';c.fillRect(0,0,900,1500);
  return new THREE.CanvasTexture(cv);
}
const ptx=mkPaperTex();
const PW=2.1,PH=3.5;
function mkHalf(top){
  const g=new THREE.PlaneGeometry(PW,PH/2,4,4);
  const uv=g.attributes.uv.array;
  for(let i=0;i<uv.length;i+=2)uv[i+1]=top?uv[i+1]*.5+.5:uv[i+1]*.5;
  g.attributes.uv.needsUpdate=true;g.translate(0,top?PH/4:-PH/4,0);
  return new THREE.Mesh(g,new THREE.MeshStandardMaterial({map:ptx,roughness:.86,metalness:0,side:THREE.DoubleSide}));
}
const PG=new THREE.Group(),PT=mkHalf(true),PB=mkHalf(false);
PG.add(new THREE.Mesh(new THREE.PlaneGeometry(PW+.3,PH+.3),new THREE.MeshBasicMaterial({color:0,transparent:true,opacity:.6})));
PG.add(PT,PB);SC.add(PG);

/* ═══════ KATANA GLB ═══════ */
const KAT=new THREE.Group();
KAT.position.set(S.kx,S.ky,S.kz);
KAT.rotation.set(S.krx,S.kry,S.krz);
SC.add(KAT);

/* Aura particles */
const AN=260;const aP=new Float32Array(AN*3);
for(let i=0;i<AN;i++){
  const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=Math.pow(Math.random(),.5);
  aP[i*3]=r*.65*Math.sin(ph)*Math.cos(th);
  aP[i*3+1]=r*2.8*Math.sin(ph)*Math.sin(th);
  aP[i*3+2]=r*.65*Math.cos(ph);
}
const aGeo=new THREE.BufferGeometry();aGeo.setAttribute('position',new THREE.BufferAttribute(aP,3));
const aMat=new THREE.PointsMaterial({color:0x7700ee,size:.042,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});
KAT.add(new THREE.Points(aGeo,aMat));
KAT.userData.aMat=aMat;KAT.userData.aGeo=aGeo;

const loader=new THREE.GLTFLoader();
const ltEl=document.getElementById('lt'),leEl=document.getElementById('lerr');
loader.load('models/katana.glb',
  gltf=>{
    const mdl=gltf.scene;
    const box=new THREE.Box3().setFromObject(mdl);
    const sz=box.getSize(new THREE.Vector3());
    const sc=5.2/Math.max(sz.x,sz.y,sz.z,.001);
    mdl.scale.setScalar(sc);
    const ctr=box.getCenter(new THREE.Vector3());
    mdl.position.set(-ctr.x*sc,-ctr.y*sc,-ctr.z*sc);
    const meshes=[];
    mdl.traverse(c=>{
      if(!c.isMesh)return;
      c.castShadow=c.receiveShadow=true;
      const ms=Array.isArray(c.material)?c.material:[c.material];
      c.material=Array.isArray(c.material)?ms.map(m=>enh(m)):enh(ms[0]);
      meshes.push(c);
    });
    KAT.add(mdl);KAT.userData.meshes=meshes;S.modelReady=true;
  },
  xhr=>{if(xhr.total>0)ltEl.textContent=`Tempering · ${Math.round(xhr.loaded/xhr.total*100)}%`;},
  err=>{console.error(err);leEl.style.display='block';leEl.textContent='⚠ models/katana.glb not found';S.modelReady=true;}
);
function enh(m){
  const c=m.clone();
  if(!c.emissive)c.emissive=new THREE.Color(0);
  const col=c.color||new THREE.Color(1,1,1);
  if((col.r+col.g+col.b)/3<.14){c.metalness=Math.max(c.metalness||0,.96);c.roughness=Math.min(c.roughness!==undefined?c.roughness:1,.05);}
  return c;
}

/* ═══════ THRONE REFLECTION ═══════ */
const offCv=document.getElementById('off');
const offX=offCv.getContext('2d');
function drawThrone(scroll,mnx){
  const W=1024,H=1024;const sc=Math.min(scroll*1.5,1);
  offX.clearRect(0,0,W,H);
  const bg=offX.createRadialGradient(W/2,H*.28,0,W/2,H*.6,W*.85);
  bg.addColorStop(0,sc>.5?'rgba(55,0,8,.98)':'rgba(26,0,55,.98)');

function drawCracks(c,W,H,t){
  const rng=s=>{let x=Math.sin(s)*43758.5;return x-Math.floor(x);};

  for(let i=0;i<n;i++){
    const cx=W*.35+rng(i)*W*.3,cy=H*.18+rng(i+1)*H*.4,len=25+t*165*rng(i+2),ang=rng(i+3)*Math.PI*2;
    c.strokeStyle=`rgba(225,180,255,${.38+t*.42})`;c.lineWidth=.7+t*.9;c.beginPath();
    let x=cx,y=cy;c.moveTo(x,y);
    for(let j=0;j<9;j++){const da=(rng(i*9+j)-.5)*.9;x+=Math.cos(ang+da)*len*.12;y+=Math.sin(ang+da)*len*.12;c.lineTo(x,y);}
    c.stroke();
  }
  if(t>.28){c.fillStyle=`rgba(255,40,0,${(t-.28)*.14})`;c.fillRect(0,0,W,H);}
}
function drawShatter(c,W,H,t,mnx,sc){
  const rng=s=>{let x=Math.sin(s)*43758.5;return x-Math.floor(x);};
  for(let i=0;i<38;i++){
    const r=rng(i+1),r2=rng(i+50),r3=rng(i+100),r4=rng(i+150),r5=rng(i+200);
    const px=r*W+(r2-.5)*t*340+(mnx*(r5-.5)*85);
    const py=r3*H+(1-r4)*t*260;
    const sz=6+r2*58,rot=(r+t*3.5)*Math.PI*4;
    const al=Math.max(0,(1.55-sc*1.25)*.72)*(.28+r*.62);
    c.save();c.translate(px,py);c.rotate(rot);
    const pg=c.createLinearGradient(-sz,-sz,sz,sz);pg.addColorStop(0,`rgba(115,0,235,${al})`);pg.addColorStop(1,`rgba(38,0,95,${al*.35})`);
    c.fillStyle=pg;const sides=3+Math.floor(r4*3);c.beginPath();
    for(let s=0;s<sides;s++){const a=s/sides*Math.PI*2;s===0?c.moveTo(Math.cos(a)*sz,Math.sin(a)*sz):c.lineTo(Math.cos(a)*sz,Math.sin(a)*sz);}
    c.closePath();c.fill();c.restore();
  }
  const rng2=s=>{let x=Math.sin(s*13.7+55)*43758.5;return x-Math.floor(x);};
  for(let i=0;i<12;i++){const fx=W*.25+rng2(i)*W*.5,fy=H*.45+rng2(i+4)*H*.2,fr=28+rng2(i+8)*75;const fg=c.createRadialGradient(fx,fy,0,fx,fy,fr*t*2);fg.addColorStop(0,`rgba(255,${Math.floor(88*t)},0,${t*.65})`);fg.addColorStop(.5,`rgba(180,0,${Math.floor(55*t)},${t*.3})`);fg.addColorStop(1,'rgba(0,0,0,0)');c.fillStyle=fg;c.beginPath();c.arc(fx,fy,fr*t*2,0,Math.PI*2);c.fill();}
  for(let i=0;i<14;i++){const rng3=s=>{let x=Math.sin(s*5.3+88)*43758.5;return x-Math.floor(x);};c.strokeStyle=`rgba(255,${Math.floor(185*(1-t))},255,${(1-t*.85)*(rng3(i)*.5+.18)})`;c.lineWidth=1+t*.8;c.beginPath();c.moveTo(rng3(i)*W,rng3(i+1)*H);c.lineTo(rng3(i+2)*W,rng3(i+3)*H);c.stroke();}
}

function shimmer(){

  document.getElementById('u2').style.opacity='0';
  document.getElementById('bs').style.opacity='0';
  document.getElementById('sp').style.opacity='0';
  tw(S,{hI:1.6},0.28,'o',()=>{
    const fl=document.getElementById('fl');fl.style.cssText='background:rgba(48,0,95,1);opacity:1;transition:opacity .07s;';
    setTimeout(()=>{document.getElementById('a3').classList.add('on');fl.style.opacity='0';fl.style.transition='opacity 1.6s';},110);
  });
}

/* ═══════ LOOP ═══════ */
function bladeScreen(){
  const v=new THREE.Vector3(KAT.position.x,KAT.position.y,KAT.position.z);
  v.project(CAM);return{x:(v.x*.5+.5)*innerWidth,y:(-.5*v.y+.5)*innerHeight};
}
function loop(ts){
  requestAnimationFrame(loop);
  S.dt=Math.min((ts-S.lt)*.001,.055);S.lt=ts;S.t+=S.dt;
  stepTw(S.dt);
  const wf=Math.sin(S.t*.32)*1.4;

  // 2D sky
  drawSky(S.nx,S.ny,S.t);

  // 2D FX
  if(S.phase==='ACT1'||S.phase==='LOAD'){drawFX(wf,S.t);}
  drawFire();drawDrag();

  // Haki
  if(S.phase!=='ACT1'&&S.phase!=='LOAD'&&S.hI>.01){
    const bp=bladeScreen();drawHaki(S.hI,bp.x,bp.y);
  }

  // Paper
  if(PG.visible){
    PT.rotation.x=S.ptRX;PT.position.y=S.ptPY;
    PB.rotation.x=S.pbRX;PB.position.y=S.pbPY;
    if(S.phase==='ACT1'){PG.rotation.y=Math.sin(S.t*.38)*.014+S.nx*.016;PG.rotation.x=S.ny*.011;}
  }

  // Katana Act1 mouse tracking
  if(S.phase==='ACT1'){
    const tx=.22+S.nx*.18,ty=S.ny*.12,tz=.58+S.ny*.07;
    S.kx+=(tx-S.kx)*.05;S.ky+=(ty-S.ky)*.05;S.kz+=(tz-S.kz)*.05;
    S.ky+=Math.sin(S.t*.85)*.0035;
    if(Math.random()<.0007){tw(S,{aI:.72},.22,'o',()=>tw(S,{aI:0},.8,'o'));tw(S,{hI:.42},.28,'o',()=>tw(S,{hI:0},.85,'o'));}
  }
  KAT.position.set(S.kx,S.ky+Math.sin(S.t*.75)*.003,S.kz);
  KAT.rotation.set(S.krx,S.kry,S.krz);

  // Aura particle drift
  {const ap=aGeo.attributes.position.array;
    for(let i=0;i<ap.length;i+=3){
      ap[i]+=(Math.random()-.5)*.005;ap[i+1]+=(Math.random()-.5)*.009;ap[i+2]+=(Math.random()-.5)*.005;
      if(Math.abs(ap[i])>.68)ap[i]*=.95;if(Math.abs(ap[i+1])>2.9)ap[i+1]*=.95;if(Math.abs(ap[i+2])>.68)ap[i+2]*=.95;
    }
    aGeo.attributes.position.needsUpdate=true;
    aMat.opacity=Math.max(0,Math.min(.82,S.aI*.78+Math.sin(S.t*2.6)*.08*S.aI));
  }

  // Emissive pulse on GLB meshes
  if(KAT.userData.meshes&&(S.gI>0||S.aI>0)){
    const pl=S.gI*2.2+S.aI*.75+Math.sin(S.t*2.4)*.28;
    KAT.userData.meshes.forEach(m=>{const mat=Array.isArray(m.material)?m.material[0]:m.material;if(mat?.emissive)mat.emissive.setRGB(pl*.1,0,pl*.25);});
  }

  // Scroll → throne update
  if(S.phase==='ACT2_SCROLL'){
    S.sv*=.87;S.sp=Math.max(0,Math.min(1,S.sp+S.sv));
    document.getElementById('spf').style.height=(S.sp*100)+'%';
    drawThrone(S.sp,S.nx*.14);throneTex.needsUpdate=true;
    refPl.material.opacity=.58+S.sp*.2;
    S.hI=.7+S.sp*.9;
  }

  // Dynamic lights
  eL.intensity=S.gI*4.5+S.aI*1.8;eL.position.set(KAT.position.x,KAT.position.y+1.5,KAT.position.z+.35);
  aL.intensity=S.aI*2.8+S.gI*1.3;aL.position.copy(KAT.position);

  // Camera
  CAM.position.set(
    S.phase==='ACT1'?S.camX+S.nx*.08:S.camX,
    S.phase==='ACT1'?S.camY+S.ny*.06:S.camY,
    S.camZ
  );
  CAM.lookAt(0,0,0);

  // Mountain parallax
  mtnGrp.children.forEach(m=>{
    m.position.x+=((S.nx*m.userData.pf*.8)-m.position.x)*.04;
    m.position.y+=((-S.ny*m.userData.pf*.25)-m.position.y)*.04;
  });
  // Mist + rays
  mistGrp.children.forEach(m=>{m.position.x=Math.sin(S.t*m.userData.sp)*m.userData.amp*11+S.nx*.12;});
  rayGrp.children.forEach(r=>{r.material.opacity=r.userData.bo*(.4+.6*Math.sin(S.t*.72+r.userData.ph));});
  sMat.opacity=.44+Math.sin(S.t*.2)*.1;

  R.toneMappingExposure=.88+S.gI*.55+S.aI*.14;
  R.render(SC,CAM);
}

/* ═══════ LOADER ═══════ */
const lfEl=document.getElementById('lf');let lp=0;
const li=setInterval(()=>{lp+=2+Math.random()*9;lfEl.style.width=Math.min(lp,85)+'%';if(lp>=85)clearInterval(li);},88);
function go(){lfEl.style.width='100%';setTimeout(()=>{document.getElementById('ld').classList.add('out');S.phase='ACT1';S.lt=performance.now();requestAnimationFrame(loop);},620);}
const poll=setInterval(()=>{if(S.modelReady){clearInterval(poll);go();}},110);
setTimeout(()=>{if(!S.modelReady)S.modelReady=true;},7000);
</script>
